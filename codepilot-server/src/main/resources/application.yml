server:
  port: 8080

spring:
  application:
    name: codepilot-server
  codec:
    max-in-memory-size: 10MB

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Datasource (H2 for dev)
  datasource:
    url: jdbc:h2:mem:codepilot;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# GitHub
github:
  token: ${GITHUB_TOKEN:}
  api:
    base-url: https://api.github.com
  rate-limit:
    max-retries: 3
    retry-delay-ms: 1000

# AI Providers
ai:
  default-provider: ${AI_DEFAULT_PROVIDER:deepseek}
  providers:
    openai:
      api-key: ${OPENAI_API_KEY:}
      api-url: https://api.openai.com/v1/chat/completions
      model: gpt-4o
      max-tokens: 4096
      temperature: 0.3
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      api-url: https://api.deepseek.com/v1/chat/completions
      model: deepseek-chat
      max-tokens: 4096
      temperature: 0.3
    claude:
      api-key: ${CLAUDE_API_KEY:}
      api-url: https://api.anthropic.com/v1/messages
      model: claude-sonnet-4-6
      max-tokens: 4096
      temperature: 0.3
    qwen:
      api-key: ${QWEN_API_KEY:}
      api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      model: qwen-plus
      max-tokens: 4096
      temperature: 0.3

# Review Config
review:
  max-files-per-chunk: 10
  max-diff-lines-per-chunk: 500
  cache-ttl-minutes: 30

# Logging
logging:
  level:
    com.codepilot: debug
    org.springframework.web: info
